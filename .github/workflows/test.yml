name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: brew install bats-core shellcheck pcre

      - name: Run dot test (shellcheck + bats)
        run: ./bin/dot test
